# ============================================================
#  TREASURE HUNT — CONFIG FILE
#  Edit this file, then drop it in the same folder as index.html
#  The hunt page loads it automatically on startup.
# ============================================================

# ── PENALTY ─────────────────────────────────────────────────
# How many seconds are added when a red-herring tag is scanned
penalty_seconds: 60

# ── TEAMS ───────────────────────────────────────────────────
# Each team MUST have a unique start_tag.
# The start_tag value is the ?tag= part of the NFC URL.
teams:
  - name: "Team Alpha"
    start_tag: "start-a"
    color: "#c8860a"

  - name: "Team Bravo"
    start_tag: "start-b"
    color: "#1a4a80"

  - name: "Team Charlie"
    start_tag: "start-c"
    color: "#2a7040"

  - name: "Team Delta"
    start_tag: "start-d"
    color: "#b03020"

# ── TRAIL TAGS ──────────────────────────────────────────────
# Tags that form the trail, listed IN ORDER.
# The LAST tag is automatically the finish line.
# Teams can skip intermediate tags — only start + finish are required.
trail_tags:
  - id: "trail-1"
    clue: "Well done! Now look somewhere cold… very cold."

  - id: "trail-2"
    clue: "Getting warmer! Check where the books live."

  - id: "trail-3"
    clue: "You're on fire! Find where people sit and relax."

  - id: "trail-4"
    clue: "Almost there! Look up high, near where you sleep."

  - id: "trail-5"
    clue: "🎉 You found the treasure! Claim your prize from the host."

# ── RED HERRING TAGS ────────────────────────────────────────
# Tags scattered around that are NOT part of the trail.
# Scanning any of these adds penalty_seconds to the team's time.
red_herring_tags:
  - "red-1"
  - "red-2"
  - "red-3"
  - "red-4"
  - "red-5"

# ── START TAG CLUES (optional) ──────────────────────────────
# Message shown on screen when each team scans their start tag.
start_clues:
  "start-a": "Alpha team — your hunt begins! First clue: find something that keeps things cold."
  "start-b": "Bravo team — your hunt begins! First clue: find something that keeps things cold."
  "start-c": "Charlie team — your hunt begins! First clue: find something that keeps things cold."
  "start-d": "Delta team — your hunt begins! First clue: find something that keeps things cold."
